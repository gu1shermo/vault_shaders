<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 640" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="arw" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#e9eef6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="640" fill="#ffffff"/>
  <rect x="1" y="1" width="758" height="638" fill="none" stroke="#d5dbe6"/>

  <!-- Title -->
  <text x="30" y="28" font-size="18" font-weight="700" fill="#1d2733">Étape 8 — découper le tunnel&#160;:&#160; mod → cut → max → min</text>

  <!-- Legend -->
  <rect x="30" y="44" width="14" height="14" fill="#3f5170" stroke="#2a3850"/>
  <text x="50" y="55" font-size="12" fill="#54627a">matière (paroi)</text>
  <rect x="170" y="44" width="14" height="14" fill="#e9eef6" stroke="#b9c4d6"/>
  <text x="190" y="55" font-size="12" fill="#54627a">vide intérieur</text>
  <rect x="300" y="44" width="14" height="14" fill="#0f1622"/>
  <text x="320" y="55" font-size="12" fill="#54627a">dehors / fond</text>
  <rect x="420" y="44" width="14" height="14" fill="#6b4f2e" stroke="#4a3620"/>
  <text x="440" y="55" font-size="12" fill="#54627a">sol</text>
  <text x="730" y="55" font-size="12" fill="#1d2733" text-anchor="end" font-weight="600">min = union ∪ &#160;·&#160; max = intersection ∩</text>

  <!-- ============ PANEL A : 8.1 mod ============ -->
  <text x="30" y="89" font-size="13" font-weight="700" fill="#2a3850">8.1 · mod() — l'axe Z est replié en cellules de 1 m (paroi encore lisse)</text>
  <!-- interior + walls, continuous -->
  <rect x="80" y="112" width="630" height="58" fill="#e9eef6"/>
  <rect x="80" y="96"  width="630" height="16" fill="#3f5170" stroke="#2a3850" stroke-width="0.5"/>
  <rect x="80" y="170" width="630" height="16" fill="#3f5170" stroke="#2a3850" stroke-width="0.5"/>
  <!-- cell boundaries (dashed) -->
  <g stroke="#9aa7bd" stroke-width="1" stroke-dasharray="4 3">
    <line x1="132.5" y1="92" x2="132.5" y2="190"/>
    <line x1="237.5" y1="92" x2="237.5" y2="190"/>
    <line x1="342.5" y1="92" x2="342.5" y2="190"/>
    <line x1="447.5" y1="92" x2="447.5" y2="190"/>
    <line x1="552.5" y1="92" x2="552.5" y2="190"/>
    <line x1="657.5" y1="92" x2="657.5" y2="190"/>
  </g>
  <!-- 1 m measure -->
  <line x1="132.5" y1="141" x2="237.5" y2="141" stroke="#54627a" stroke-width="1" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <rect x="170" y="132" width="30" height="16" fill="#e9eef6"/>
  <text x="185" y="144" font-size="11" fill="#54627a" text-anchor="middle">1 m</text>
  <text x="715" y="145" font-size="11" fill="#8a95a8">Z →</text>

  <!-- ============ PANEL B : 8.2 cut ============ -->
  <text x="30" y="221" font-size="13" font-weight="700" fill="#2a3850">8.2 · cut = abs(pc.z) − .1 — une « rondelle » gardée par cellule, le reste = trou</text>
  <rect x="80" y="244" width="630" height="58" fill="#e9eef6"/>
  <rect x="80" y="228" width="630" height="16" fill="#3f5170" stroke="#2a3850" stroke-width="0.5"/>
  <rect x="80" y="302" width="630" height="16" fill="#3f5170" stroke="#2a3850" stroke-width="0.5"/>
  <!-- ribs (cut<0) over each cell centre -->
  <g fill="#6f86ad" opacity="0.5">
    <rect x="69.5"  y="224" width="21" height="98"/>
    <rect x="174.5" y="224" width="21" height="98"/>
    <rect x="279.5" y="224" width="21" height="98"/>
    <rect x="384.5" y="224" width="21" height="98"/>
    <rect x="489.5" y="224" width="21" height="98"/>
    <rect x="594.5" y="224" width="21" height="98"/>
    <rect x="699.5" y="224" width="21" height="98"/>
  </g>
  <text x="290" y="216" font-size="10.5" fill="#34516f" text-anchor="middle">rondelle · cut&lt;0</text>
  <text x="342.5" y="216" font-size="10.5" fill="#a84432" text-anchor="middle">trou · cut&gt;0</text>

  <!-- ============ PANEL C : 8.3 max (intersection) ============ -->
  <text x="30" y="353" font-size="13" font-weight="700" fill="#2a3850">8.3 · max(tube, cut) — intersection : il ne reste que les arceaux (fenêtres entre eux)</text>
  <rect x="80" y="360" width="630" height="90" fill="#0f1622"/>
  <!-- rings only at cell centres -->
  <g>
    <!-- centre 80 --><rect x="69.5"  y="376" width="21" height="58" fill="#e9eef6"/><rect x="69.5"  y="360" width="21" height="16" fill="#3f5170"/><rect x="69.5"  y="434" width="21" height="16" fill="#3f5170"/>
    <!-- 185 --><rect x="174.5" y="376" width="21" height="58" fill="#e9eef6"/><rect x="174.5" y="360" width="21" height="16" fill="#3f5170"/><rect x="174.5" y="434" width="21" height="16" fill="#3f5170"/>
    <!-- 290 --><rect x="279.5" y="376" width="21" height="58" fill="#e9eef6"/><rect x="279.5" y="360" width="21" height="16" fill="#3f5170"/><rect x="279.5" y="434" width="21" height="16" fill="#3f5170"/>
    <!-- 395 --><rect x="384.5" y="376" width="21" height="58" fill="#e9eef6"/><rect x="384.5" y="360" width="21" height="16" fill="#3f5170"/><rect x="384.5" y="434" width="21" height="16" fill="#3f5170"/>
    <!-- 500 --><rect x="489.5" y="376" width="21" height="58" fill="#e9eef6"/><rect x="489.5" y="360" width="21" height="16" fill="#3f5170"/><rect x="489.5" y="434" width="21" height="16" fill="#3f5170"/>
    <!-- 605 --><rect x="594.5" y="376" width="21" height="58" fill="#e9eef6"/><rect x="594.5" y="360" width="21" height="16" fill="#3f5170"/><rect x="594.5" y="434" width="21" height="16" fill="#3f5170"/>
    <!-- 710 --><rect x="699.5" y="376" width="21" height="58" fill="#e9eef6"/><rect x="699.5" y="360" width="21" height="16" fill="#3f5170"/><rect x="699.5" y="434" width="21" height="16" fill="#3f5170"/>
  </g>
  <text x="342.5" y="372" font-size="10.5" fill="#e9eef6" text-anchor="middle">fenêtre → on voit dehors</text>
  <line x1="342.5" y1="438" x2="342.5" y2="449" stroke="#c0392b" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="430" y="447" font-size="10.5" fill="#e7a59c">⚠ trou sous les pieds</text>

  <!-- ============ PANEL D : 8.4 min (sol) ============ -->
  <text x="30" y="485" font-size="13" font-weight="700" fill="#2a3850">8.4 · min(cut, p.y + .3) — on ajoute un sol continu (version finale)</text>
  <rect x="80" y="492" width="630" height="90" fill="#0f1622"/>
  <g>
    <rect x="69.5"  y="508" width="21" height="58" fill="#e9eef6"/><rect x="69.5"  y="492" width="21" height="16" fill="#3f5170"/>
    <rect x="174.5" y="508" width="21" height="58" fill="#e9eef6"/><rect x="174.5" y="492" width="21" height="16" fill="#3f5170"/>
    <rect x="279.5" y="508" width="21" height="58" fill="#e9eef6"/><rect x="279.5" y="492" width="21" height="16" fill="#3f5170"/>
    <rect x="384.5" y="508" width="21" height="58" fill="#e9eef6"/><rect x="384.5" y="492" width="21" height="16" fill="#3f5170"/>
    <rect x="489.5" y="508" width="21" height="58" fill="#e9eef6"/><rect x="489.5" y="492" width="21" height="16" fill="#3f5170"/>
    <rect x="594.5" y="508" width="21" height="58" fill="#e9eef6"/><rect x="594.5" y="492" width="21" height="16" fill="#3f5170"/>
    <rect x="699.5" y="508" width="21" height="58" fill="#e9eef6"/><rect x="699.5" y="492" width="21" height="16" fill="#3f5170"/>
  </g>
  <!-- continuous floor -->
  <rect x="80" y="566" width="630" height="16" fill="#6b4f2e" stroke="#4a3620" stroke-width="0.5"/>
  <text x="395" y="578" font-size="10.5" fill="#f0e6d8" text-anchor="middle">sol continu — on ne tombe plus</text>
  <text x="342.5" y="504" font-size="10.5" fill="#e9eef6" text-anchor="middle">fenêtre (ciel / dehors)</text>

  <!-- bottom note -->
  <text x="30" y="612" font-size="11" fill="#8a95a8">Coupe latérale (Z horizontal, Y vertical). Chaque cellule de mod() se répète à l'infini le long de Z.</text>
</svg>
